<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Business Ledger Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, var(--dark-bg) 60%);
            margin: 0; 
            padding: 30px 20px; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        .container { 
            max-width: 800px; 
            background: var(--card-bg); 
            margin: 0 auto; 
            padding: 35px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 50px rgba(99, 102, 241, 0.05); 
            border: 1px solid var(--border);
        }

        h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        
        /* Dashboard Stats Cards */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 18px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            padding: 20px; 
            border-radius: 14px; 
            background: rgba(15, 23, 42, 0.4); 
            border: 1px solid var(--border); 
            text-align: center; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .stat-card h4 { margin: 0 0 8px 0; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .stat-net { color: #818cf8; }
        .stat-income { color: var(--success); }
        .stat-expense { color: var(--danger); }

        /* Form Inputs Container */
        .input-box-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: rgba(15, 23, 42, 0.6); 
            padding: 20px; 
            border-radius: 14px; 
            margin-bottom: 30px; 
            border: 1px solid var(--border); 
        }
        .input-row { display: flex; gap: 12px; }
        
        input[type="text"], input[type="number"], select { 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 14px; 
            outline: none; 
            background: var(--input-bg);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]::placeholder, input[type="number"]::placeholder { color: #64748b; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }
        input[type="number"] { flex: 1; }
        select { padding-right: 20px; cursor: pointer; }
        #txDescription { width: calc(100% - 28px); }
        
        /* Action Buttons */
        button { 
            padding: 14px 24px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .btn-add { background-color: var(--success); color: #0f172a; width: 100%; font-weight: 700; }
        .btn-add:hover { background-color: var(--success-hover); transform: translateY(-1px); }
        .btn-add:active { transform: translateY(1px); }
        
        .btn-ai { 
            background: linear-gradient(135deg, var(--primary), #a855f7); 
            color: white; 
            width: 100%; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); 
            font-size: 15px;
        }
        .btn-ai:hover { 
            background: linear-gradient(135deg, var(--primary-hover), #9333ea); 
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }
        .btn-clear { background-color: transparent; color: #64748b; font-size: 13px; padding: 6px 12px; border: 1px solid transparent; border-radius: 6px;}
        .btn-clear:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); }

        /* Search & Filter Utility bar */
        .utility-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .utility-bar h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .search-input { width: 220px; padding: 10px 14px; font-size: 13px; }

        /* Records Ledger Log Table */
        .table-container { 
            max-height: 320px; 
            overflow-y: auto; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: rgba(15, 23, 42, 0.2);
        }
        
        /* Custom scrollbar styling for the table container */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-track { background: transparent; }
        .table-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1e293b; padding: 14px; color: var(--text-muted); font-weight: 600; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        td { padding: 14px; border-bottom: 1px solid var(--border); color: #cbd5e1; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-block; }
        .badge-income { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-expense { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        /* AI Panel Bubble */
        .ai-section { display: none; margin-top: 30px; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .ai-box { 
            background: linear-gradient(145deg, #1e1b4b, #0f172a); 
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-left: 5px solid var(--primary); 
            color: #e2e8f0; 
            padding: 20px; 
            border-radius: 12px; 
            font-style: italic; 
            line-height: 1.6; 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span>📊 Daily Business Ledger Pro</span>
        <button class="btn-clear" onclick="resetLedger()">🧹 Reset Ledger</button>
    </h2>
    
    <div class="stats-grid">
        <div class="stat-card">
            <h4>Total Income</h4>
            <p id="totalIncome" class="stat-income">₹0</p>
        </div>
        <div class="stat-card">
            <h4>Total Expense</h4>
            <p id="totalExpense" class="stat-expense">₹0</p>
        </div>
        <div class="stat-card">
            <h4>Net Balance</h4>
            <p id="netBalance" class="stat-net">₹0</p>
        </div>
    </div>

    <div class="input-box-group">
        <div class="input-row">
            <select id="txType">
                <option value="Income">🟢 Income</option>
                <option value="Expense">🔴 Expense</option>
            </select>
            <input type="number" id="txAmount" placeholder="Amount (₹)" min="1">
        </div>
        <input type="text" id="txDescription" placeholder="Description (e.g., Sold silk shirts, Paid electricity bill)">
        <button class="btn-add" onclick="addTransaction()">➕ Log Transaction</button>
    </div>

    <div class="utility-bar">
        <h3>📋 Transaction History Log</h3>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search records..." onkeyup="filterRecords()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="ledgerTableBody">
                </tbody>
        </table>
    </div>

    <hr style="border: 0; height: 1px; background: var(--border); margin: 35px 0;">

    <button class="btn-ai" onclick="getAIAnalysis()">🤖 Ask AI Financial Audit Consultant</button>

    <div id="aiResponseContainer" class="ai-section">
        <h3 style="font-size: 16px; color: var(--text-muted); margin-bottom: 10px;">💡 AI Business Insights Summary:</h3>
        <div id="aiResponse" class="box ai-box"></div>
    </div>
</div>

<script>
    const BACKEND_URL = "http://127.0.0.1:8000";

    // 1. Fetch backend list and build structured table layout with live balance metrics
    async function loadLedger() {
        const response = await fetch(`${BACKEND_URL}/ledger`);
        const data = await response.json();
        
        const tableBody = document.getElementById("ledgerTableBody");
        tableBody.innerHTML = ""; 

        let incomeTotal = 0;
        let expenseTotal = 0;

        data.daily_records.forEach(record => {
            const parts = record.match(/\[(.*?)\] \((.*?)\) (.*?) - ₹(.*)/);
            
            let dateStr, type, desc, amount;
            
            if (parts) {
                dateStr = parts[1];
                type = parts[2];
                desc = parts[3];
                amount = parseFloat(parts[4]);
            } else {
                dateStr = new Date().toLocaleDateString();
                type = record.toLowerCase().includes("paid") ? "Expense" : "Income";
                desc = record;
                const cashMatch = record.match(/₹\s*(\d+)/);
                amount = cashMatch ? parseFloat(cashMatch[1]) : 0;
            }

            if (type === "Income") incomeTotal += amount;
            else expenseTotal += amount;

            const row = document.createElement("tr");
            row.innerHTML = `
                <td style="color: var(--text-muted); font-size: 13px;">${dateStr}</td>
                <td><span class="badge ${type === 'Income' ? 'badge-income' : 'badge-expense'}">${type}</span></td>
                <td style="font-weight: 500;">${desc}</td>
                <td style="font-weight: bold; color: ${type === 'Income' ? 'var(--success)' : 'var(--danger)'}">₹${amount}</td>
            `;
            tableBody.appendChild(row);
        });

        document.getElementById("totalIncome").textContent = `₹${incomeTotal}`;
        document.getElementById("totalExpense").textContent = `₹${expenseTotal}`;
        const net = incomeTotal - expenseTotal;
        const netElement = document.getElementById("netBalance");
        netElement.textContent = `₹${net}`;
        netElement.style.color = net >= 0 ? "var(--success)" : "var(--danger)";
    }

    // 2. Structured packaging sent down to POST backend route mapping architecture
    async function addTransaction() {
        const typeSelect = document.getElementById("txType").value;
        const amountInput = document.getElementById("txAmount").value.trim();
        const descInput = document.getElementById("txDescription").value.trim();

        if (!amountInput || !descInput) return alert("Please specify both Amount and Description details!");

        const now = new Date();
        const timestamp = `${now.toLocaleDateString()} ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        const finalFormattedPayload = `[${timestamp}] (${typeSelect}) ${descInput} - ₹${amountInput}`;

        await fetch(`${BACKEND_URL}/ledger?text_detail=${encodeURIComponent(finalFormattedPayload)}`, {
            method: "POST"
        });
        
        document.getElementById("txAmount").value = "";
        document.getElementById("txDescription").value = "";
        loadLedger(); 
    }

    // 3. Trigger Groq Client Core Request Handling
    async function getAIAnalysis() {
        const responseBox = document.getElementById("aiResponseContainer");
        const textDiv = document.getElementById("aiResponse");
        textDiv.textContent = "AI Consulting Engine auditing financial entries ledger, analyzing statements context patterns...";
        responseBox.style.display = "block";

        const response = await fetch(`${BACKEND_URL}/ai-analysis`, { method: "POST" });
        const data = await response.json();
        
        textDiv.textContent = data.business_insight;
    }

    // 4. Reset operation mapping structure
    async function resetLedger() {
        if(confirm("Perform full wipe on today's operating records registry ledger?")) {
            await fetch(`${BACKEND_URL}/ledger`, { method: "DELETE" });
            document.getElementById("aiResponseContainer").style.display = "none";
            loadLedger();
        }
    }

    // Local filter operation logic engine running purely in client runtime environment
    function filterRecords() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.getElementById("ledgerTableBody").getElementsByTagName("tr");
        
        for (let row of rows) {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        }
    }

    loadLedger();
</script>

</body>
</html>
